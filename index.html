<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS EFS Shared Storage</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f766e);
    overflow:hidden;
    color:white;
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
    font-size:55px;
    animation:fadeDown 1.5s ease;
}

p{
    margin-top:20px;
    font-size:22px;
    color:#ddd;
    animation:fadeUp 2s ease;
}

.architecture{
    margin-top:80px;
    width:900px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.server{
    width:180px;
    height:180px;
    background:#2563eb;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 0 20px #38bdf8;
    animation:float 3s infinite;
}

.efs{
    width:220px;
    height:220px;
    background:#f59e0b;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    font-weight:bold;
    box-shadow:0 0 30px yellow;
    animation:pulse 2s infinite;
}

.line{
    width:120px;
    height:6px;
    background:white;
    position:relative;
}

.line::after{
    content:"";
    position:absolute;
    width:18px;
    height:18px;
    background:#00ff66;
    border-radius:50%;
    top:-6px;
    left:0;
    animation:dataMove 2s linear infinite;
}

.footer{
    position:absolute;
    bottom:30px;
    font-size:18px;
    color:#ccc;
}

@keyframes dataMove{
    from{left:0;}
    to{left:100%;}
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

@keyframes fadeDown{
    from{
        opacity:0;
        transform:translateY(-80px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(80px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<div class="container">

<h1>☁ AWS Elastic File System (EFS)</h1>

<p>Shared Storage Between Multiple EC2 Instances</p>

<div class="architecture">

<div class="server">
🖥️
<br>
EC2
<br>
Web Server 1
</div>

<div class="line"></div>

<div class="efs">
EFS
</div>

<div class="line"></div>

<div class="server">
🖥️
<br>
EC2
<br>
Web Server 2
</div>

</div>

<div class="footer">
AWS DevOps Project | Shared Storage using Amazon EFS
</div>

</div>

</body>
</html>
